server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para mejor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # React Router: todas las rutas desconocidas van a index.html
    # Sin esto, /migration daria 404 al hacer refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de llamadas API al backend
    # El frontend llama a /api/*, nginx lo redirige al backend-service
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache para assets estaticos (JS, CSS, imagenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
