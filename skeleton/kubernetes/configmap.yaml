apiVersion: v1
kind: ConfigMap
metadata:
  name: govtech-config
  namespace: govtech
  labels:
    app: govtech
    component: configuration
data:
  # Configuracion de Node.js
  NODE_ENV: "production"
  PORT: "3000"
  HOST: "0.0.0.0"

  # Configuracion de Cloud Provider
  CLOUD_PROVIDER: "aws"
  AWS_REGION: "us-east-1"

  # Configuracion de logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Configuracion de la aplicacion
  API_VERSION: "v1"
  APP_NAME: "GovTech Cloud Migration Platform"

  # Features flags (activar/desactivar funcionalidades)
  ENABLE_MONITORING: "true"
  ENABLE_CACHE: "true"
  ENABLE_RATE_LIMITING: "true"

  # Timeouts y limites
  REQUEST_TIMEOUT: "30000"
  MAX_REQUEST_SIZE: "10mb"
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX: "100"
