name: Deploy to Dev

# Se ejecuta automaticamente cuando hay push a staging
# El flujo es: feature/* -> staging (este workflow) -> main (deploy-prod)
on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Deploy a Dev (EKS govtech-dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ----------------------------------------
      # TERRAFORM: Verificar infraestructura
      # ----------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        working-directory: ./terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform/environments/dev
        run: terraform plan -out=tfplan
        env:
          TF_VAR_environment: dev
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Terraform Apply
        working-directory: ./terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      # ----------------------------------------
      # KUBERNETES: Conectar y desplegar
      # ----------------------------------------
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig para EKS dev
        run: aws eks update-kubeconfig --name govtech-dev --region us-east-1

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy a Kubernetes
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/backend/deployment.yaml
          kubectl apply -f kubernetes/backend/service.yaml
          kubectl apply -f kubernetes/frontend/deployment.yaml
          kubectl apply -f kubernetes/frontend/service.yaml

      - name: Esperar rollout de backend
        run: kubectl rollout status deployment/backend -n govtech --timeout=300s

      - name: Esperar rollout de frontend
        run: kubectl rollout status deployment/frontend -n govtech --timeout=300s

      # ----------------------------------------
      # SMOKE TESTS: Verificar que funciona
      # ----------------------------------------
      - name: Smoke tests
        run: |
          echo "Verificando pods..."
          kubectl get pods -n govtech

          echo "Verificando services..."
          kubectl get services -n govtech

          echo "Deploy a Dev completado exitosamente"
