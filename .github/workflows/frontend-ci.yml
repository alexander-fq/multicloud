name: Frontend CI

on:
  push:
    branches: [main, develop, staging]
    paths:
      - 'platform/app/frontend/**'
  pull_request:
    branches: [main, staging]
    paths:
      - 'platform/app/frontend/**'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Lint, Audit & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./platform/app/frontend
        run: npm ci

      - name: Run linter
        working-directory: ./platform/app/frontend
        run: npm run lint || echo "No lint script configured"

      - name: Security audit (bloqueante en HIGH/CRITICAL)
        working-directory: ./platform/app/frontend
        # CORREGIDO: Eliminado "|| true"
        run: npm audit --audit-level=high

      - name: Build production bundle
        working-directory: ./platform/app/frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: platform/app/frontend/dist/
          retention-days: 7

  build-and-push:
    name: Build, Scan & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # BUILD -> SCAN -> PUSH (orden correcto)
      - name: Build Docker image
        working-directory: ./platform/app/frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: govtech-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Scan image for vulnerabilities ANTES de push (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/govtech-frontend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push image to ECR (solo si el scan paso)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: govtech-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/govtech-frontend:${{ github.sha }}
          format: 'cyclonedx'
          output: 'frontend-sbom.json'
          exit-code: '0'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom-${{ github.sha }}
          path: frontend-sbom.json
          retention-days: 90
