# ============================================================
# Ingress: NGINX Ingress Controller (alternativa generica)
# Colaborador B - Semana 4
#
# Cuando usar este en lugar de ingress-aws.yaml:
# - Clusters que no estan en AWS (minikube, GKE, on-premise)
# - Cuando no se quiere depender del AWS Load Balancer Controller
# - Para pruebas locales con minikube
#
# Como instalar NGINX Ingress Controller:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: govtech-ingress-nginx
  namespace: govtech
  labels:
    app: govtech
  annotations:
    # Usar el controller de nginx (no el de AWS)
    kubernetes.io/ingress.class: nginx

    # Reescribir la URL antes de enviarla al backend
    # Sin esto, /api/health llegaría al backend como /api/health (correcto)
    # Con rewrite seria /health (incorrecto para nuestra app)
    # nginx.ingress.kubernetes.io/rewrite-target: /

    # Configuracion del proxy
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"  # Limite de upload

    # Rate limiting (proteccion basica contra abuso)
    nginx.ingress.kubernetes.io/limit-rps: "100"       # Max 100 req/s por IP
    nginx.ingress.kubernetes.io/limit-connections: "20" # Max 20 conexiones simultaneas por IP

    # Habilitar compresion gzip
    nginx.ingress.kubernetes.io/enable-compression: "true"

spec:
  # TLS: configurar si tienes certificado (cert-manager puede generarlo automaticamente)
  # tls:
  #   - hosts:
  #       - govtech.local
  #     secretName: govtech-tls

  rules:
    - host: govtech.local  # Para pruebas locales agregar a /etc/hosts
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

# ============================================================
# PRUEBAS LOCALES CON MINIKUBE:
#
# 1. Habilitar ingress en minikube:
#    minikube addons enable ingress
#
# 2. Obtener IP de minikube:
#    minikube ip
#
# 3. Agregar a /etc/hosts (reemplazar IP con la de minikube):
#    echo "192.168.49.2 govtech.local" | sudo tee -a /etc/hosts
#
# 4. Aplicar el ingress:
#    kubectl apply -f kubernetes/ingress/ingress-nginx.yaml
#
# 5. Verificar:
#    curl http://govtech.local/api/health
# ============================================================
