# ============================================================
# Inventario Ansible - GovTech Cloud
#
# Ansible necesita saber a que servidores conectarse.
# Este inventario define los grupos de hosts y sus variables.
#
# En AWS, los hosts se pueden obtener de dos formas:
# 1. Estatico (este archivo): IPs fijas, bueno para pocos servidores
# 2. Inventario dinamico (aws_ec2 plugin): descubre servidores por tags,
#    recomendado cuando EKS escala automaticamente los nodos
# ============================================================
all:
  vars:
    # Conexion SSH base para todos los hosts
    ansible_user: ec2-user          # Usuario por defecto en Amazon Linux 2
    ansible_ssh_private_key_file: ~/.ssh/govtech-key.pem
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3

  children:
    # ========================
    # NODOS DE EKS
    # Los EC2 que forman el Node Group del cluster
    # ========================
    eks_nodes:
      vars:
        ansible_user: ec2-user
        node_group: govtech-nodes
        cluster_name: govtech-dev
      hosts:
        eks-node-1:
          ansible_host: 10.0.10.10  # IP privada del nodo (reemplazar con IPs reales)
        eks-node-2:
          ansible_host: 10.0.11.10

    eks_nodes_prod:
      vars:
        ansible_user: ec2-user
        cluster_name: govtech-prod
      hosts:
        eks-prod-node-1:
          ansible_host: 10.2.10.10
        eks-prod-node-2:
          ansible_host: 10.2.11.10
        eks-prod-node-3:
          ansible_host: 10.2.12.10

    # ========================
    # BASTION HOST (opcional)
    # Servidor de salto para acceder a hosts en subnets privadas
    # Todos los playbooks contra hosts privados usan el bastion como jump host
    # ========================
    bastion:
      hosts:
        bastion-dev:
          ansible_host: "{{ lookup('env', 'BASTION_IP') }}"  # Desde variable de entorno
          ansible_user: ec2-user

    # ========================
    # LOCALHOST (para tareas que corren localmente)
    # Ejemplo: generar certificados, ejecutar scripts de AWS CLI
    # ========================
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
