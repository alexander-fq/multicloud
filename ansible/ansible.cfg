[defaults]
# Inventario por defecto
inventory = ansible/inventory/hosts.yml

# No verificar fingerprint de hosts nuevos (en entornos efimeros de nube)
# En produccion con hosts fijos, cambiar a True
host_key_checking = False

# Log de todas las ejecuciones
log_path = /var/log/ansible/govtech.log

# Numero de hosts en paralelo (forks)
forks = 10

# Timeout de conexion SSH
timeout = 30

# Mostrar tiempo de ejecucion por tarea
callback_whitelist = profile_tasks, timer

# Formato de output (yaml es mas legible)
stdout_callback = yaml

# Reintentos de conexion
retry_files_enabled = True
retry_files_save_path = /tmp/ansible-retry

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Control de conexiones SSH (reutilizar la misma conexion)
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[inventory]
# Cachear el inventario dinamico de AWS por 5 minutos
# Evita llamadas repetitivas a la API de AWS
cache = True
cache_plugin = jsonfile
cache_timeout = 300
cache_connection = /tmp/ansible-inventory-cache
